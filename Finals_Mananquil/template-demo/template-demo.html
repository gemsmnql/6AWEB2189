<form (ngSubmit)="onSubmit()" #myForm = "ngForm">
  <input
    class="input-box"
    type="text"
    name="username"
    [(ngModel)]="username"
    placeholder="Enter username"
    required>

  <input
    class="input-box"
    type="email"
    name="email"
    [(ngModel)]="email"
    placeholder="Enter email"
    required
    email>

  <input
    class="input-box"
    type="password"
    name="password"
    [(ngModel)]="password"
    placeholder="Enter password"
    required
    minlength="6">

  <select
    class="input-box"
    name="role"
    [(ngModel)]="role"
    required>
    <option value="" disabled selected>Select Role</option>
    <option value="admin">Admin</option>
    <option value="user">User</option>
    <option value="guest">Guest</option>
  </select>

  <div>
    <label>Gender:</label>
    <label><input type="radio" name="gender" [(ngModel)]="gender" value="male" required> Male</label>
    <label><input type="radio" name="gender" [(ngModel)]="gender" value="female"> Female</label>
    <label><input type="radio" name="gender" [(ngModel)]="gender" value="other"> Other</label>
  </div>

  <div>
    <label>Status:</label>
    <select name="status" [(ngModel)]="status" required>
      <option value="" disabled selected>Select Status</option>
      <option value="permanent">Permanent</option>
      <option value="probationary">Probationary</option>
    </select>
  </div>

  <div>
    <label>Comments:</label>
    <textarea class="input-box" name="comments" [(ngModel)]="comments" placeholder="Enter notes or comments"></textarea>
  </div>

  <input
    class="btn"
    type="submit"
    value="Submit"
    [disabled]="!myForm.valid">

    <div *ngIf="myForm.submitted" class="custom-card review-card">
  <h2>Submission Summary</h2>
  <hr style="border-color: var(--glass-border); margin-bottom: 20px;">

  <div class="summary-item"><strong>Username:</strong> {{ username }}</div>
  <div class="summary-item"><strong>Email:</strong> {{ email }}</div>
  <div class="summary-item"><strong>Role:</strong> {{ role }}</div>
  <div class="summary-item"><strong>Gender:</strong> {{ gender }}</div>
  <div class="summary-item"><strong>Status:</strong> {{ status }}</div>
  <div class="summary-item"><strong>Notes:</strong> {{ comments }}</div>
</div>
</form>
